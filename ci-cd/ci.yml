name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "8.0.x" }
      - run: dotnet restore src/LegacyModern.csproj
      - run: dotnet build src/LegacyModern.csproj -c Release --no-restore
      - run: dotnet test tests/ --verbosity normal
